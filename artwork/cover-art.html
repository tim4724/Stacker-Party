<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../public/shared/fonts/orbitron.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { background: #06060f; }
    body {
      overflow: hidden;
      background: #06060f;
      width: 1024px;
      height: 1024px;
      position: relative;
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 50% 50%, rgba(0, 80, 200, 0.18) 0%, transparent 55%);
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 110px;
      letter-spacing: 0.06em;
      background: linear-gradient(135deg, #4444ff, #00c8ff, #00ff88);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 32px rgba(0, 200, 255, 0.4));
      text-align: center;
      line-height: 1.0;
      white-space: nowrap;
    }

    h1 .sub {
      display: block;
      font-size: 0.38em;
      font-weight: 600;
      letter-spacing: 0.55em;
      margin-top: 0.32em;
      text-transform: uppercase;
      -webkit-text-fill-color: #e0e0ff;
      color: #e0e0ff;
      opacity: 0.82;
    }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>
  <div class="overlay">
    <h1>HEX STACKER<span class="sub">party</span></h1>
  </div>

  <script>
    // Canonical hex palette (mirrors public/shared/theme.js PIECE_COLORS 1..8).
    const PIECE_COLORS = {
      I: '#EE4444', O: '#7FFF00', S: '#9B59F0', Z: '#FF8C00',
      q: '#FFD700', p: '#00CED1', L: '#FF1493', J: '#3377FF',
    };

    // Hex piece axial coordinates — mirror server/Piece.js base orientations.
    const PIECES = {
      I: [[-1,0],[0,0],[1,0],[2,0]],
      O: [[-1,0],[0,0],[0,-1],[1,-1]],
      S: [[-2,1],[-1,1],[0,0],[1,0]],
      Z: [[-1,1],[0,0],[1,0],[2,-1]],
      q: [[-1,0],[0,0],[1,0],[1,-1]],
      p: [[-1,1],[0,0],[1,-1],[-1,0]],
      L: [[-1,1],[0,0],[1,-1],[1,-2]],
      J: [[1,0],[0,0],[-1,0],[-1,-1]],
    };

    // Cover-art c3 layout — 8 pieces spread around the 1024×1024 frame with
    // the title centered. Top half has shorter trails (less room above);
    // bottom half has longer trails. Position of green O has been nudged so
    // it sits well above the title text.
    const DROPS = [
      // Top half — pushed up to reduce the top gap
      { type: 'L', x: 130, y: 220, size: 50, trailLen: 220 },
      { type: 'S', x: 700, y: 70,  size: 46, trailLen: 280 },
      { type: 'q', x: 440, y: 320, size: 42, trailLen: 200 },
      { type: 'O', x: 880, y: 290, size: 38, trailLen: 200 },
      // Mid-low
      { type: 'Z', x: 60,  y: 610, size: 38, trailLen: 180 },
      // Bottom half — pushed down to reduce the bottom gap
      { type: 'p', x: 760, y: 770, size: 44, trailLen: 240 },
      { type: 'I', x: 220, y: 780, size: 48, trailLen: 320 },
      { type: 'J', x: 540, y: 880, size: 42, trailLen: 240 },
    ];

    // ---- Canvas + geometry ----
    const SQRT3 = Math.sqrt(3);
    const canvas = document.getElementById('bg');
    const W = 1024;
    const H = 1024;
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    const ctx = canvas.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    function axialToOffset(q, r) {
      return { col: q, row: r + ((q - (q & 1)) >> 1) };
    }

    function hexCenter(bx, by, col, row, hexSize) {
      const colW = 1.5 * hexSize;
      const hexH = SQRT3 * hexSize;
      return [
        bx + colW * col + hexSize,
        by + hexH * (row + 0.5 * (col & 1)) + hexH / 2
      ];
    }

    function hexPath(cx, cy, r) {
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = Math.PI / 3 * i;
        const x = cx + r * Math.cos(a);
        const y = cy + r * Math.sin(a);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.closePath();
    }

    function hexToRgb(hex) {
      const m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
      return m ? { r: parseInt(m[1],16), g: parseInt(m[2],16), b: parseInt(m[3],16) } : null;
    }
    function clamp255(v) { return Math.min(255, Math.max(0, Math.round(v))); }
    function lighten(hex, pct) {
      const c = hexToRgb(hex); if (!c) return hex;
      const f = 1 + pct / 100;
      return `rgb(${clamp255(c.r*f)},${clamp255(c.g*f)},${clamp255(c.b*f)})`;
    }
    function darken(hex, pct) {
      const c = hexToRgb(hex); if (!c) return hex;
      const f = 1 - pct / 100;
      return `rgb(${Math.round(c.r*f)},${Math.round(c.g*f)},${Math.round(c.b*f)})`;
    }
    function rgba(hex, a) {
      const c = hexToRgb(hex); if (!c) return hex;
      return `rgba(${c.r},${c.g},${c.b},${a})`;
    }

    function drawHexCell(cx, cy, r, color) {
      const grad = ctx.createLinearGradient(cx, cy - r, cx, cy + r);
      grad.addColorStop(0, lighten(color, 18));
      grad.addColorStop(1, darken(color, 12));
      ctx.fillStyle = grad;
      hexPath(cx, cy, r);
      ctx.fill();
      ctx.strokeStyle = rgba(color, 0.55);
      ctx.lineWidth = 1.2;
      ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,0.18)';
      ctx.beginPath();
      ctx.ellipse(cx, cy - r * 0.45, r * 0.55, r * 0.18, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawPiece(ax, ay, type, hexSize) {
      const cells = PIECES[type];
      const color = PIECE_COLORS[type];
      for (const [q, r] of cells) {
        const off = axialToOffset(q, r);
        const [hx, hy] = hexCenter(ax, ay, off.col, off.row, hexSize);
        drawHexCell(hx, hy, hexSize * 0.95, color);
      }
    }

    // Per-column motion-blur streaks (matches cover-variations c3).
    function drawCellStreaks(ax, ay, type, hexSize, length, color, opts = {}) {
      const cells = PIECES[type];
      const topByCol = new Map();
      for (const [q, r] of cells) {
        const off = axialToOffset(q, r);
        const [cx, cy] = hexCenter(ax, ay, off.col, off.row, hexSize);
        const prev = topByCol.get(off.col);
        if (!prev || cy < prev.cy) topByCol.set(off.col, { cx, cy });
      }
      const hexH = SQRT3 * hexSize;
      const flatWidth = hexSize;
      const intensity = opts.intensity != null ? opts.intensity : 0.18;
      const blurPx = opts.blur != null ? opts.blur : hexSize * 0.18;

      for (const { cx, cy } of topByCol.values()) {
        const headY = cy - hexH / 2;
        const tailY = headY - length;
        ctx.save();
        ctx.filter = `blur(${blurPx}px)`;
        const grad = ctx.createLinearGradient(0, tailY, 0, headY);
        grad.addColorStop(0,    rgba(color, 0));
        grad.addColorStop(0.75, rgba(color, intensity * 0.25));
        grad.addColorStop(1,    rgba(color, intensity));
        ctx.fillStyle = grad;
        ctx.fillRect(cx - flatWidth / 2, tailY, flatWidth, length);
        ctx.restore();
      }
    }

    // ---- Render ----
    // Streaks first so pieces sit on top of their own trails.
    for (const d of DROPS) {
      drawCellStreaks(d.x, d.y, d.type, d.size, d.trailLen, PIECE_COLORS[d.type]);
    }
    for (const d of DROPS) {
      drawPiece(d.x, d.y, d.type, d.size);
    }
    // Subtle center darken so the title reads cleanly above the dense lower band.
    const dim = ctx.createRadialGradient(W/2, H/2, 80, W/2, H/2, 420);
    dim.addColorStop(0, 'rgba(6,6,15,0.65)');
    dim.addColorStop(1, 'rgba(6,6,15,0)');
    ctx.fillStyle = dim;
    ctx.fillRect(0, 0, W, H);
  </script>
</body>
</html>

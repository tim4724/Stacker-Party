<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HexStacker Party — Cover Builder</title>
  <link rel="stylesheet" href="../public/shared/fonts/orbitron.css">
  <!-- Production theme tokens: --bg-primary, --accent-primary/secondary/tertiary,
       --text-secondary, .gradient-title, .gradient-title__sub. Kept in sync with
       the live UI so cover/social previews never drift. -->
  <link rel="stylesheet" href="../public/shared/theme.css">
  <style>
    :root {
      --bg: #06060f;
      --panel: #0e0e1a;
      --border: #22223a;
      --fg: #e8e8f0;
      --muted: #8a8aa0;
      --accent: #00c8ff;
      --selected: #ffaa00;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      height: 100%;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }
    header h1 {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.18em;
      color: var(--accent);
    }
    .modes { display: flex; gap: 4px; }
    button {
      background: transparent;
      color: var(--fg);
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
    }
    button:hover { background: rgba(255,255,255,0.05); }
    button.active { background: var(--accent); color: #000; border-color: var(--accent); }
    .spacer { flex: 1; }
    .toggles { display: flex; gap: 12px; align-items: center; color: var(--muted); }
    .toggles label { display: flex; gap: 6px; align-items: center; cursor: pointer; }

    .layout {
      display: flex;
      height: calc(100vh - 50px);
    }
    main {
      flex: 1;
      overflow: hidden;
      padding: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      /* Outside the frame: a slightly-lighter shade with a faint grid so the
         frame boundary stands out clearly against it. */
      background:
        repeating-linear-gradient(0deg,  rgba(255,255,255,0.025) 0 1px, transparent 1px 40px),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.025) 0 1px, transparent 1px 40px),
        #15151f;
    }
    .frame {
      position: relative;
      flex-shrink: 0;
      background: var(--bg-primary);
      /* Sharp accent outline + soft drop-shadow so the frame edge is obvious. */
      outline: 2px solid color-mix(in srgb, var(--accent) 50%, transparent);
      outline-offset: 0;
      box-shadow:
        0 0 0 4px rgba(0, 200, 255, 0.08),
        0 24px 60px rgba(0, 0, 0, 0.7);
    }
    .frame canvas {
      display: block;
      cursor: crosshair;
    }
    .frame.dragging canvas { cursor: grabbing; }

    /* Headless mode — used by Playwright capture. Hide all builder chrome
       and render the frame at exact native pixel size with no padding,
       outline, or shadow that would bleed into the screenshot. */
    body.headless { overflow: hidden; }
    body.headless header,
    body.headless aside { display: none; }
    body.headless .layout { height: 100vh; }
    body.headless main { padding: 0; background: var(--bg-primary); }
    body.headless .frame {
      outline: none;
      box-shadow: none;
    }

    /* Title uses the shared .gradient-title / .gradient-title__sub classes from
       theme.css — font, gradient, and subtitle spacing inherit automatically.
       This block only adds cover-specific layout + the drop-shadow the welcome
       screen applies via display.css. */
    .title-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      background: radial-gradient(ellipse at 50% 50%, rgba(var(--accent-primary-rgb), 0.07) 0%, transparent 55%);
    }
    .title-overlay.hidden { display: none; }

    .title-overlay h1 {
      filter: drop-shadow(0 8px 24px rgba(0, 0, 0, 0.45));
      text-align: center;
      line-height: 1.0;
      white-space: nowrap;
    }

    aside {
      width: 320px;
      flex-shrink: 0;
      border-left: 1px solid var(--border);
      background: var(--panel);
      overflow-y: auto;
      padding: 16px;
    }
    aside h2 {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .help {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 16px;
      line-height: 1.5;
    }
    .help kbd {
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1px 5px;
      font-family: ui-monospace, monospace;
      font-size: 10px;
    }
    .piece-list { list-style: none; }
    .piece-row {
      display: grid;
      grid-template-columns: 28px 1fr;
      align-items: center;
      gap: 8px;
      padding: 8px;
      border: 1px solid transparent;
      border-radius: 4px;
      cursor: pointer;
      margin-bottom: 4px;
    }
    .piece-row:hover { background: rgba(255,255,255,0.03); }
    .piece-row.selected {
      border-color: var(--selected);
      background: rgba(255, 170, 0, 0.08);
    }
    .piece-swatch {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .piece-fields {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 4px;
      width: 100%;
      font-size: 10px;
    }
    .piece-fields label {
      color: var(--muted);
      display: block;
      margin-bottom: 2px;
    }
    .piece-fields input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--fg);
      padding: 3px 4px;
      border-radius: 2px;
      font-family: ui-monospace, monospace;
      font-size: 10px;
    }
    .piece-fields input:focus { outline: 1px solid var(--accent); border-color: var(--accent); }

    .export-area {
      margin-top: 16px;
      border-top: 1px solid var(--border);
      padding-top: 16px;
    }
    .export-area textarea {
      width: 100%;
      height: 240px;
      background: var(--bg);
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 8px;
      font-family: ui-monospace, monospace;
      font-size: 11px;
      resize: vertical;
    }
    .export-area .row { display: flex; gap: 6px; margin-top: 6px; }
    .export-area .row button { flex: 1; }
  </style>
</head>
<body>
  <header>
    <h1>COVER BUILDER</h1>
    <div class="modes">
      <button id="mode-cover" class="active">Cover 1024×1024</button>
      <button id="mode-social">Social 1280×640</button>
    </div>
    <div class="spacer"></div>
    <div class="toggles">
      <label><input type="checkbox" id="show-title" checked>Title</label>
      <label><input type="checkbox" id="show-streaks" checked>Streaks</label>
    </div>
  </header>

  <div class="layout">
    <main>
      <div class="frame" id="frame">
        <canvas id="canvas"></canvas>
        <div class="title-overlay" id="title-overlay">
          <h1 class="gradient-title">HEX STACKER<span class="gradient-title__sub">party</span></h1>
        </div>
      </div>
    </main>
    <aside>
      <h2>Pieces</h2>
      <p class="help">
        Click a piece (or row) to select.<br>
        Drag in the canvas to move.<br>
        <kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> nudge 1px,
        <kbd>Shift</kbd>+arrow = 10px.
      </p>
      <ul class="piece-list" id="piece-list"></ul>
      <div class="export-area">
        <h2>Export</h2>
        <textarea id="export-text" readonly></textarea>
        <div class="row">
          <button id="copy-btn">Copy DROPS</button>
          <button id="reset-btn">Reset to defaults</button>
        </div>
      </div>
    </aside>
  </div>

  <!-- Production palette — exposes PIECE_COLORS (typeId→hex) + PARTY_PALETTE. -->
  <script src="../public/shared/theme.js"></script>
  <script>
    // Derive a letter-keyed piece-color map from theme.js's typeId-keyed one,
    // so the builder tracks any palette change automatically. PIECES below
    // holds shape offsets (not colors), so it stays here.
    const PIECE_TYPE_ID = { I: 1, O: 2, S: 3, Z: 4, q: 5, p: 6, L: 7, J: 8 };
    const PIECE_FILL = Object.fromEntries(
      Object.entries(PIECE_TYPE_ID).map(([letter, id]) => [letter, PIECE_COLORS[id]])
    );

    // ============================================================
    // Canonical piece data (mirrors server/HexPiece.js).
    // ============================================================
    const PIECES = {
      I: [[-1,0],[0,0],[1,0],[2,0]],
      O: [[-1,0],[0,0],[0,-1],[1,-1]],
      S: [[-2,1],[-1,1],[0,0],[1,0]],
      Z: [[-1,1],[0,0],[1,0],[2,-1]],
      q: [[-1,0],[0,0],[1,0],[1,-1]],
      p: [[-1,1],[0,0],[1,-1],[-1,0]],
      L: [[-1,1],[0,0],[1,-1],[1,-2]],
      J: [[1,0],[0,0],[-1,0],[-1,-1]],
    };

    // ============================================================
    // Default DROPS — the production layouts. Reset button restores these.
    // Edit these arrays to change the canonical cover/social art; the
    // generators (generate-cover.js, generate-social.js) capture this same
    // file in headless mode, so updates here flow into the PNGs on next run.
    // ============================================================
    const DEFAULT_COVER = [
      { type: 'S', x: 700, y: 40,  size: 46, trailLen: 180 },
      { type: 'L', x: 130, y: 165, size: 50, trailLen: 180 },
      { type: 'O', x: 864, y: 255, size: 38, trailLen: 180 },
      { type: 'q', x: 440, y: 270, size: 42, trailLen: 180 },
      { type: 'Z', x: 82,  y: 612, size: 38, trailLen: 180 },
      { type: 'p', x: 818, y: 704, size: 44, trailLen: 180 },
      { type: 'I', x: 211, y: 804, size: 48, trailLen: 180 },
      { type: 'J', x: 570, y: 829, size: 42, trailLen: 180 },
    ];
    const DEFAULT_SOCIAL = [
      { type: 'O', x: 215,  y: 102, size: 32, trailLen: 180 },
      { type: 'p', x: 600,  y: 86,  size: 34, trailLen: 180 },
      { type: 'S', x: 971,  y: 57,  size: 36, trailLen: 180 },
      { type: 'q', x: 70,   y: 460, size: 34, trailLen: 180 },
      { type: 'Z', x: 1089, y: 403, size: 32, trailLen: 180 },
      { type: 'L', x: 282,  y: 521, size: 36, trailLen: 180 },
      { type: 'I', x: 553,  y: 478, size: 42, trailLen: 180 },
      { type: 'J', x: 907,  y: 527, size: 36, trailLen: 180 },
    ];

    const MODES = {
      cover:  { W: 1024, H: 1024, mainPx: 100, subMarginEm: 0.32, defaults: DEFAULT_COVER },
      social: { W: 1280, H: 640,  mainPx: 128, subMarginEm: 0.28, defaults: DEFAULT_SOCIAL },
    };

    // Headless mode: render only — no UI chrome, no scaling, no interaction.
    // Used by generate-cover.js / generate-social.js to capture the PNGs.
    // Activated via URL: cover-builder.html?headless=cover or ?headless=social
    const headless = new URLSearchParams(location.search).get('headless');
    const isHeadless = headless === 'cover' || headless === 'social';
    if (isHeadless) document.body.classList.add('headless');

    // ============================================================
    // State
    // ============================================================
    let mode = isHeadless ? headless : 'cover';
    let drops = clone(MODES[mode].defaults);
    let selectedIdx = -1;
    let showTitle = true;
    let showStreaks = true;

    function clone(arr) { return arr.map(d => ({...d})); }

    // ============================================================
    // Geometry helpers — flat-top hex, odd-q offset (mirrors server/HexPiece.js).
    // ============================================================
    const SQRT3 = Math.sqrt(3);

    function axialToOffset(q, r) {
      return { col: q, row: r + ((q - (q & 1)) >> 1) };
    }
    function hexCenter(bx, by, col, row, hexSize) {
      const colW = 1.5 * hexSize;
      const hexH = SQRT3 * hexSize;
      return [
        bx + colW * col + hexSize,
        by + hexH * (row + 0.5 * (col & 1)) + hexH / 2
      ];
    }
    function hexPath(ctx, cx, cy, r) {
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = Math.PI / 3 * i;
        const x = cx + r * Math.cos(a);
        const y = cy + r * Math.sin(a);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.closePath();
    }

    function hexToRgb(hex) {
      const m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
      return m ? { r: parseInt(m[1],16), g: parseInt(m[2],16), b: parseInt(m[3],16) } : null;
    }
    function clamp255(v) { return Math.min(255, Math.max(0, Math.round(v))); }
    function lighten(hex, pct) {
      const c = hexToRgb(hex); if (!c) return hex;
      const f = 1 + pct / 100;
      return `rgb(${clamp255(c.r*f)},${clamp255(c.g*f)},${clamp255(c.b*f)})`;
    }
    function darken(hex, pct) {
      const c = hexToRgb(hex); if (!c) return hex;
      const f = 1 - pct / 100;
      return `rgb(${Math.round(c.r*f)},${Math.round(c.g*f)},${Math.round(c.b*f)})`;
    }
    function rgba(hex, a) {
      const c = hexToRgb(hex); if (!c) return hex;
      return `rgba(${c.r},${c.g},${c.b},${a})`;
    }

    function drawHexCell(ctx, cx, cy, r, color) {
      const grad = ctx.createLinearGradient(cx, cy - r, cx, cy + r);
      grad.addColorStop(0, lighten(color, 18));
      grad.addColorStop(1, darken(color, 12));
      ctx.fillStyle = grad;
      hexPath(ctx, cx, cy, r);
      ctx.fill();
      ctx.strokeStyle = rgba(color, 0.55);
      ctx.lineWidth = 1.2;
      ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,0.18)';
      ctx.beginPath();
      ctx.ellipse(cx, cy - r * 0.45, r * 0.55, r * 0.18, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawPiece(ctx, ax, ay, type, hexSize, opts = {}) {
      const cells = PIECES[type];
      const color = PIECE_FILL[type];
      for (const [q, r] of cells) {
        const off = axialToOffset(q, r);
        const [hx, hy] = hexCenter(ax, ay, off.col, off.row, hexSize);
        drawHexCell(ctx, hx, hy, hexSize * 0.95, color);
      }
      if (opts.outline) {
        // Bounding-box outline for the selected piece — easier to see.
        const cs = cells.map(([q, r]) => {
          const off = axialToOffset(q, r);
          return hexCenter(ax, ay, off.col, off.row, hexSize);
        });
        const xs = cs.map(c => c[0]), ys = cs.map(c => c[1]);
        const x0 = Math.min(...xs) - hexSize - 4;
        const x1 = Math.max(...xs) + hexSize + 4;
        const y0 = Math.min(...ys) - hexSize - 4;
        const y1 = Math.max(...ys) + hexSize + 4;
        ctx.save();
        ctx.strokeStyle = '#ffaa00';
        ctx.lineWidth = 2;
        ctx.setLineDash([6, 4]);
        ctx.strokeRect(x0, y0, x1 - x0, y1 - y0);
        ctx.restore();
      }
    }

    function drawCellStreaks(ctx, ax, ay, type, hexSize, length, color) {
      const cells = PIECES[type];
      const topByCol = new Map();
      for (const [q, r] of cells) {
        const off = axialToOffset(q, r);
        const [cx, cy] = hexCenter(ax, ay, off.col, off.row, hexSize);
        const prev = topByCol.get(off.col);
        if (!prev || cy < prev.cy) topByCol.set(off.col, { cx, cy });
      }
      const hexH = SQRT3 * hexSize;
      const flatWidth = hexSize;
      const intensity = 0.18;
      const blurPx = hexSize * 0.18;

      for (const { cx, cy } of topByCol.values()) {
        const headY = cy - hexH / 2;
        const tailY = headY - length;
        ctx.save();
        ctx.filter = `blur(${blurPx}px)`;
        const grad = ctx.createLinearGradient(0, tailY, 0, headY);
        grad.addColorStop(0,    rgba(color, 0));
        grad.addColorStop(0.75, rgba(color, intensity * 0.25));
        grad.addColorStop(1,    rgba(color, intensity));
        ctx.fillStyle = grad;
        ctx.fillRect(cx - flatWidth / 2, tailY, flatWidth, length);
        ctx.restore();
      }
    }

    // ============================================================
    // Render
    // ============================================================
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    function setupCanvas() {
      const { W, H } = MODES[mode];
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      // Canvas keeps its native pixel resolution; CSS handles display sizing.
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      if (isHeadless) sizeFrame(1);
      else fitFrame();
    }

    // Apply width/height to frame, canvas, and title overlay at the given scale.
    function sizeFrame(scale) {
      const { W, H, mainPx, subMarginEm } = MODES[mode];
      const sw = Math.floor(W * scale);
      const sh = Math.floor(H * scale);
      const frame = document.getElementById('frame');
      frame.style.width = sw + 'px';
      frame.style.height = sh + 'px';
      canvas.style.width = sw + 'px';
      canvas.style.height = sh + 'px';
      // Title h1: font-size scales with frame so visual proportions stay fixed.
      // margin-top is em-based on .sub so it scales automatically with font-size.
      const h1 = document.getElementById('title-overlay').querySelector('h1');
      h1.style.fontSize = (mainPx * scale) + 'px';
      h1.querySelector('.gradient-title__sub').style.marginTop = subMarginEm + 'em';
    }

    // Compute the largest scale that fits the frame inside the available main
    // area. Mouse coordinate conversion (mouseToCanvas) already accounts for
    // CSS scaling.
    function fitFrame() {
      const { W, H } = MODES[mode];
      const main = document.querySelector('main');
      const styles = window.getComputedStyle(main);
      const padX = parseFloat(styles.paddingLeft) + parseFloat(styles.paddingRight);
      const padY = parseFloat(styles.paddingTop) + parseFloat(styles.paddingBottom);
      const availW = main.clientWidth - padX;
      const availH = main.clientHeight - padY;
      const scale = Math.min(availW / W, availH / H, 1);
      sizeFrame(scale);
    }

    if (!isHeadless) window.addEventListener('resize', fitFrame);

    function render() {
      const { W, H } = MODES[mode];
      // Track the live --bg-primary token so the canvas matches the HTML frame.
      ctx.fillStyle = getComputedStyle(document.documentElement)
        .getPropertyValue('--bg-primary').trim() || '#1E1A2B';
      ctx.fillRect(0, 0, W, H);

      if (showStreaks) {
        for (const d of drops) {
          drawCellStreaks(ctx, d.x, d.y, d.type, d.size, d.trailLen, PIECE_FILL[d.type]);
        }
      }
      for (let i = 0; i < drops.length; i++) {
        const d = drops[i];
        drawPiece(ctx, d.x, d.y, d.type, d.size, { outline: i === selectedIdx });
      }
    }

    // ============================================================
    // Hit testing — click a piece to select it.
    // ============================================================
    function pieceAt(x, y) {
      // Iterate in reverse draw order (top-most first) so overlapping pieces
      // pick the one rendered last.
      for (let i = drops.length - 1; i >= 0; i--) {
        const d = drops[i];
        const cells = PIECES[d.type];
        for (const [q, r] of cells) {
          const off = axialToOffset(q, r);
          const [hx, hy] = hexCenter(d.x, d.y, off.col, off.row, d.size);
          const dx = x - hx, dy = y - hy;
          if (dx*dx + dy*dy < d.size * d.size) return i;
        }
      }
      return -1;
    }

    // Convert mouse event coordinates to canvas-pixel coordinates (accounts
    // for browser zoom / CSS scaling).
    function mouseToCanvas(e) {
      const rect = canvas.getBoundingClientRect();
      const sx = canvas.width / (Math.max(window.devicePixelRatio || 1, 1) * rect.width);
      const sy = canvas.height / (Math.max(window.devicePixelRatio || 1, 1) * rect.height);
      // Simpler: assume canvas style size matches MODE pixels (no CSS scale).
      const x = (e.clientX - rect.left) * (MODES[mode].W / rect.width);
      const y = (e.clientY - rect.top)  * (MODES[mode].H / rect.height);
      return { x, y };
    }

    // ============================================================
    // Drag handling
    // ============================================================
    let dragOffset = null;

    canvas.addEventListener('mousedown', (e) => {
      const { x, y } = mouseToCanvas(e);
      const idx = pieceAt(x, y);
      if (idx >= 0) {
        selectedIdx = idx;
        const d = drops[idx];
        dragOffset = { dx: d.x - x, dy: d.y - y };
        document.getElementById('frame').classList.add('dragging');
      } else {
        selectedIdx = -1;
        dragOffset = null;
      }
      render();
      updateSidebar();
    });

    window.addEventListener('mousemove', (e) => {
      if (!dragOffset || selectedIdx < 0) return;
      const { x, y } = mouseToCanvas(e);
      drops[selectedIdx].x = Math.round(x + dragOffset.dx);
      drops[selectedIdx].y = Math.round(y + dragOffset.dy);
      render();
      updateSidebar(true);
    });

    window.addEventListener('mouseup', () => {
      dragOffset = null;
      document.getElementById('frame').classList.remove('dragging');
      updateExport();
    });

    // ============================================================
    // Keyboard nudging
    // ============================================================
    window.addEventListener('keydown', (e) => {
      if (selectedIdx < 0) return;
      // Skip if user is typing in an input.
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      const step = e.shiftKey ? 10 : 1;
      let dx = 0, dy = 0;
      if (e.key === 'ArrowLeft')  dx = -step;
      else if (e.key === 'ArrowRight') dx = step;
      else if (e.key === 'ArrowUp')    dy = -step;
      else if (e.key === 'ArrowDown')  dy = step;
      else return;
      e.preventDefault();
      drops[selectedIdx].x += dx;
      drops[selectedIdx].y += dy;
      render();
      updateSidebar(true);
      updateExport();
    });

    // ============================================================
    // Sidebar UI
    // ============================================================
    const list = document.getElementById('piece-list');

    function buildSidebar() {
      list.innerHTML = '';
      drops.forEach((d, i) => {
        const li = document.createElement('li');
        li.className = 'piece-row' + (i === selectedIdx ? ' selected' : '');
        li.innerHTML = `
          <div class="piece-swatch" style="background:${PIECE_FILL[d.type]}"></div>
          <div class="piece-fields">
            <div><label>${d.type}.x</label><input type="number" data-i="${i}" data-k="x" value="${d.x}"></div>
            <div><label>y</label><input type="number" data-i="${i}" data-k="y" value="${d.y}"></div>
            <div><label>size</label><input type="number" data-i="${i}" data-k="size" value="${d.size}"></div>
            <div><label>trail</label><input type="number" data-i="${i}" data-k="trailLen" value="${d.trailLen}"></div>
          </div>
        `;
        li.addEventListener('mousedown', (e) => {
          // Don't steal focus if clicking the input itself.
          if (e.target.tagName === 'INPUT') return;
          selectedIdx = i;
          render();
          updateSidebar();
        });
        list.appendChild(li);
      });
      list.querySelectorAll('input').forEach(input => {
        input.addEventListener('input', (e) => {
          const i = +e.target.dataset.i;
          const k = e.target.dataset.k;
          const v = +e.target.value;
          if (Number.isFinite(v)) {
            drops[i][k] = v;
            render();
            updateExport();
          }
        });
        input.addEventListener('focus', (e) => {
          selectedIdx = +e.target.dataset.i;
          render();
          // Highlight the row but don't rebuild sidebar (would lose focus).
          list.querySelectorAll('.piece-row').forEach((row, idx) => {
            row.classList.toggle('selected', idx === selectedIdx);
          });
        });
      });
    }

    function updateSidebar(syncOnly) {
      // syncOnly = update input values only (don't rebuild) to preserve focus.
      if (syncOnly) {
        list.querySelectorAll('.piece-row').forEach((row, i) => {
          row.classList.toggle('selected', i === selectedIdx);
          const d = drops[i];
          row.querySelectorAll('input').forEach(input => {
            const k = input.dataset.k;
            if (document.activeElement !== input) input.value = d[k];
          });
        });
      } else {
        buildSidebar();
      }
    }

    // ============================================================
    // Export
    // ============================================================
    const exportText = document.getElementById('export-text');
    function updateExport() {
      const lines = drops.map(d =>
        `      { type: '${d.type}', x: ${d.x}, y: ${d.y}, size: ${d.size}, trailLen: ${d.trailLen} },`
      );
      exportText.value = `const DROPS = [\n${lines.join('\n')}\n];`;
    }

    document.getElementById('copy-btn').addEventListener('click', () => {
      exportText.select();
      navigator.clipboard.writeText(exportText.value);
      const btn = document.getElementById('copy-btn');
      const orig = btn.textContent;
      btn.textContent = 'Copied!';
      setTimeout(() => { btn.textContent = orig; }, 1200);
    });

    document.getElementById('reset-btn').addEventListener('click', () => {
      if (!confirm('Reset all pieces to defaults?')) return;
      drops = clone(MODES[mode].defaults);
      selectedIdx = -1;
      render();
      buildSidebar();
      updateExport();
    });

    // ============================================================
    // Mode toggle + UI toggles
    // ============================================================
    function setMode(m) {
      mode = m;
      drops = clone(MODES[m].defaults);
      selectedIdx = -1;
      document.getElementById('mode-cover').classList.toggle('active', m === 'cover');
      document.getElementById('mode-social').classList.toggle('active', m === 'social');
      setupCanvas();
      render();
      buildSidebar();
      updateExport();
    }
    document.getElementById('mode-cover').addEventListener('click', () => setMode('cover'));
    document.getElementById('mode-social').addEventListener('click', () => setMode('social'));

    document.getElementById('show-title').addEventListener('change', (e) => {
      showTitle = e.target.checked;
      document.getElementById('title-overlay').classList.toggle('hidden', !showTitle);
    });
    document.getElementById('show-streaks').addEventListener('change', (e) => {
      showStreaks = e.target.checked;
      render();
    });

    // ============================================================
    // Boot
    // ============================================================
    document.fonts.ready.then(() => {
      setupCanvas();
      render();
      if (!isHeadless) {
        buildSidebar();
        updateExport();
      }
    });
  </script>
</body>
</html>

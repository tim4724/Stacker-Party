name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Fetch existing review comments
        id: existing-comments
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COMMENTS=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments \
            --jq '[.[] | {path: .path, line: .line, body: .body, user: .user.login}]')
          {
            echo 'comments<<COMMENTS_EOF'
            echo "$COMMENTS"
            echo 'COMMENTS_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Draft review (analysis pass)
        id: draft-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          use_sticky_comment: false
          track_progress: false
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            STEP 1 OF 2: DRAFT REVIEW (analysis only — do NOT post comments yet)

            Analyze this pull request thoroughly. Read the diff and surrounding source files
            to understand context (don't just rely on the diff alone).
            Focus on:
            - Code quality and best practices
            - Potential bugs or issues
            - Performance considerations
            - Security concerns
            - Test coverage

            Use the repository's CLAUDE.md for guidance on style and conventions.

            Write your draft review as a single structured document to stdout. For each finding use this format:

            ### [SEVERITY: bug|concern|nit|praise] FILE: <path> LINE: <line_number>
            <your analysis>

            Be thorough in this pass — include anything that catches your eye, even if you're
            not sure it's a real issue. The next step will filter out false alarms.

            EXISTING REVIEW COMMENTS (from previous reviews — note which are still relevant):
            ${{ steps.existing-comments.outputs.comments }}

          claude_args: |
            --allowedTools "Read,Glob,Grep,Bash(git log:*),Bash(git blame:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr checks:*)"

      - name: Publish review (filtering pass)
        id: publish-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          use_sticky_comment: true
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            STEP 2 OF 2: FILTER AND PUBLISH REVIEW

            Below is a draft review from the analysis pass. Your job is to critically evaluate
            each finding and only publish the ones that are genuinely worth raising.

            DRAFT REVIEW:
            ${{ steps.draft-review.outputs.claude_response }}

            FILTERING RULES:
            - RECLASSIFY findings where the reviewer suspected a bug but concluded it's actually
              correct. These are not bugs — but if the code was confusing enough to trigger a
              false alarm, it may be worth a nit suggesting a clarifying comment or rename.
            - DROP vague or speculative concerns that lack concrete evidence of a problem.
            - KEEP style nits only when code deviates from the existing codebase style.
              Do not impose external style preferences — match what the project already does.
            - KEEP genuine bugs, real security issues, meaningful performance problems, and
              missing test coverage for important code paths.
            - KEEP praise for particularly good patterns (sparingly — max 1-2).
            - REVISE kept findings for clarity and conciseness. Remove hedging language.
              Ensure severity labels accurately reflect the finding after filtering.

            Before publishing, re-read the relevant source files to verify the draft's claims
            are accurate. Drop any finding that doesn't hold up against the actual code.

            Before posting inline comments, fetch existing PR comments to avoid duplicating
            feedback that was already posted by a previous review run.

            For each finding you keep, post it as an inline comment on the PR.
            Then post a sticky summary comment with an overview of the review.

            RESOLVE STALE COMMENTS:
            After posting new comments, check each existing inline comment from a previous
            review run. If the issue it raised has been fixed in the current diff, resolve
            its review thread using the GraphQL API:
              gh api graphql -f query='mutation { resolveReviewThread(input:{threadId:"<thread_node_id>"}) { thread { isResolved } } }'
            To find thread IDs, use:
              gh api graphql -f query='{ repository(owner:"OWNER",name:"REPO") { pullRequest(number:PR) { reviewThreads(first:100) { nodes { id isResolved comments(first:1) { nodes { body path line author { login } } } } } } } }'
            Only resolve threads authored by this bot. Do not resolve threads from human reviewers.

            If no findings survive filtering, post a short approval comment instead.

          claude_args: |
            --allowedTools "Read,Glob,Grep,Bash(git log:*),Bash(git blame:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr checks:*),Bash(gh api:*),mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*)"

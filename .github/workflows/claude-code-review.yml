name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Review PR
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          use_sticky_comment: true
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request. Read the diff first, then only read source files when
            a specific finding requires surrounding context to verify. Do not speculatively
            read files. Use the repository's CLAUDE.md for guidance on style and conventions.

            ANALYSIS — focus on:
            - Potential bugs or logic errors
            - Security concerns
            - Performance problems
            - Missing test coverage for important code paths
            - Style deviations from the existing codebase (not external preferences)

            SELF-CRITIQUE — before posting anything, filter your findings:
            - DROP vague or speculative concerns that lack concrete evidence.
            - RECLASSIFY suspected bugs that turn out to be correct code. If the code was
              confusing enough to trigger a false alarm, consider a nit for clarity instead.
            - KEEP only genuine bugs, real security issues, meaningful performance problems,
              missing tests, and clear style deviations.
            - Include at most 1-2 praise comments for particularly good patterns.
            - Be concise and direct. Remove hedging language.

            POSTING — for each finding that survives filtering:
            1. Re-read the relevant source file to verify your claim is accurate.
            2. Post it as an inline comment on the PR.
            Then post a sticky summary comment with an overview.

            If no findings survive filtering, post a short approval comment instead.

          claude_args: |
            --model claude-sonnet-4-6 --allowedTools "Read,Glob,Grep,Bash(git log:*),Bash(git blame:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr checks:*),Bash(gh api:*),mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*)"

      - name: Resolve stale bot review threads
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Resolve stale review comments from previous bot reviews on this PR.

            1. Fetch unresolved review threads:
               gh api graphql -f query='{ repository(owner:"OWNER",name:"REPO") { pullRequest(number:PR) { reviewThreads(first:100) { nodes { id isResolved comments(first:1) { nodes { body path line author { login } } } } } } } }'
            2. Filter to threads authored by "claude[bot]" that are unresolved.
            3. For each, read the current source file at the commented path and line.
            4. Judge whether the issue described in the comment has been fixed in the current code.
            5. If fixed, resolve the thread:
               gh api graphql -f query='mutation { resolveReviewThread(input:{threadId:"<id>"}) { thread { isResolved } } }'

            Only resolve threads where you are confident the issue is fixed. Do not resolve threads from human reviewers. If there are no stale bot threads, exit immediately.
          claude_args: |
            --model claude-haiku-4-5 --allowedTools "Read,Grep,Bash(gh api:*)"
